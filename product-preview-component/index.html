<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Build a responsive product preview card component with Frontend Mentor. Practice HTML & CSS, follow design files, and improve your front-end skills with this free coding challenge." />
    <meta name="keywords" content="Frontend Mentor, HTML, CSS, product preview card, responsive design" />
    <title>Product Preview Component | Frontend Mentor | Muhaideen Nausar</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="product-card">
        <img src="./assets/image-product-desktop.jpg" alt="Gabrielle Essence Eau De Parfum" class="product-image">
        <div class="product-content">
            <p class="product-category">Perfume</p>
            <h1 class="product-name">Gabrielle Essence Eau De Parfum</h1>
            <p class="product-description">A floral, solar and voluptuous interpretation composed by Olivier Polge,
                Perfumer-Creator for the House of CHANEL.</p>
            <div class="product-price">
                <span class="discounted-price">$149.99</span>
                <span class="original-price">$169.99</span>
            </div>
            <button><img src="./assets/icon-cart.svg" alt="Cart Icon" class="cart-icon">Add to Cart</button>
        </div>
    </div>
</body>

</html>
