<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="A responsive stats preview card component built with HTML and CSS. Check out my solution to this Frontend Mentor coding challenge focusing on UI layout.">
    <meta name="keywords"
        content="Frontend Mentor, stats preview card, HTML, CSS, responsive design, web development, UI component, coding challenge">
    <title>Stats Card Preview | Frontend Mentor | Muhaideen Nausar</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Lexend+Deca:wght@100..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="stats-card">
        <div class="stats-card__content">
            <h1 class="stats-card__title">Get <span class="stats-card__title--accent">insights</span> that help your
                business grow.</h1>
            <p class="stats-card__description">Discover the benefits of data analytics and make better decisions
                regarding
                revenue, customer experience, and overall efficiency.</p>
            <div class="stats-card__stats-group">
                <div class="stats-card__stat-item">
                    <span class="stats-card__stat-value">10k+</span>
                    <span class="stats-card__stat-label">COMPANIES</span>
                </div>
                <div class="stats-card__stat-item">
                    <span class="stats-card__stat-value">314</span>
                    <span class="stats-card__stat-label">TEMPLATES</span>
                </div>
                <div class="stats-card__stat-item">
                    <span class="stats-card__stat-value">12M+</span>
                    <span class="stats-card__stat-label">QUERIES</span>
                </div>
            </div>
        </div>
        <div class="stats-card__image-wrapper">
            <img src="./assets/image-header-desktop.jpg" alt="Hero Image" class="stats-card__image-wrapper-hero-image">
            <div class="stats-card__image-wrapper-image-overlay"></div>
        </div>
    </div>
</body>

</html>
