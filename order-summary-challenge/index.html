<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Interactive order summary card component – preview your annual subscription plan, change or proceed to payment. Built with HTML/CSS as a Frontend Mentor challenge.">
    <meta name="keywords"
        content="order summary, subscription card, frontend mentor, HTML, CSS, responsive component, payment preview, UI challenge">
    <title>Order Summary Challenge | Frontend Mentor | Muhaideen Nausar</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Red+Hat+Display:ital,wght@0,300..900;1,300..900&display=swap"
        rel="stylesheet">
</head>

<body>
    <img src="./assets/pattern-background-desktop.svg" class="background-pattern">
    <div class="card-container">
        <img src="./assets/illustration-hero.svg" alt="Happy Illustration" class="hero-illustration">
        <div class="card-content">
            <h1 class="card-header-text">Order Summary</h1>
            <p class="card-description-text">You can now listen to millions of songs, audiobooks, and podcasts on any
                device anywhere you like!</p>
            <div class="plan-card-container">
                <img src="./assets/icon-music.svg" alt="Music Icon" class="plan-icon">
                <div class="plan-details">
                    <span class="plan-period">Annual Plan</span>
                    <span class="plan-price">$59.99/year</span>
                </div>
                <a href="https://github.com/muhaideennausar" class="change-plan">Change</a>
            </div>
            <button class="payment-button">Procced to Payment</button>
            <a href="https://github.com/muhaideennausar" class="cancel-order">Cancel Order</a>
        </div>
    </div>
</body>

</html>
