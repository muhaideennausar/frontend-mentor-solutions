<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="I am building a Profile card component using HTML and CSS to practice creating a responsive and visually accurate design based on the provided mockups." />
    <meta name="keywords"
        content="frontend mentor, html css practice, profile card, responsive layout, css design, web development challenge, learning frontend" />
    <title>Profile Card Component | Frontend Mentor | Muhaideen Nausar</title>
    <link rel="shortcut icon" href="../favicon.png" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kumbh+Sans:wght,YOPQ@100..900,300&display=swap"
        rel="stylesheet">
</head>

<body>
    <main>
        <div class="profile-card">
            <img src="./assets/bg-pattern-card.svg" alt="Abstract background pattern" class="profile-card__hero-banner">
            <div class="profile-card__content">
                <img src="./assets/image-victor.jpg" alt="User Profile Picture" class="profile-card__avatar">
                <p class="profile-card__username">Victor Crest</p>
                <p class="profile-card__age">26</p>
                <p class="profile-card__city">London</p>
                <hr>
                <div class="stats-group">
                    <div class="stats-group__item">
                        <p class="stats-group__value">80K</p>
                        <p class="stats-group__label">Followers</p>
                    </div>
                    <div class="stats-group__item">
                        <p class="stats-group__value">803K</p>
                        <p class="stats-group__label">Likes</p>
                    </div>
                    <div class="stats-group__item">
                        <p class="stats-group__value">1.4K</p>
                        <p class="stats-group__label">Photos</p>
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>

</html>
