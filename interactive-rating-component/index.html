<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Rating Component | Muhaideen Nausar | Frontend Mentor</title>
    <link rel="stylesheet" href="output.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Overpass:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="body-container w-full min-h-screen bg-gray-950 flex items-center justify-center px-7.5 md:px-0">
        <div
            class="component-container w-full md:max-w-100 h-fit flex flex-col bg-linear-to-b x-from-[#212730] from-[#0e1625] x-to-[#191d23] to-[#0a1121] text-white font-overpass p-7.5 md:p-8.75 rounded-[20px] gap-y-6.25 md:gap-y-7.5">
            <img src="./assets/star.svg" alt="Star Vector" class="slef-start w-fit bg-gray-900 p-3.75 rounded-full">
            <div class="text-content flex flex-col gap-y-6.25">
                <h1 class="font-bold text-2xl md:text-[1.75rem]">How did we do?</h1>
                <p class="font-normal text-sm text-gray-500 leading-6.25">Please let us know how we did with your
                    support request.
                    All feedback is
                    appreciated to help us
                    improve our offering!</p>
            </div>
            <div class="rating-buttons w-full flex justify-between">
                <button class="btn-rating" data-value="1">1</button>
                <button class="btn-rating" data-value="2">2</button>
                <button class="btn-rating" data-value="3">3</button>
                <button class="btn-rating" data-value="4">4</button>
                <button class="btn-rating" data-value="5">5</button>
            </div>
            <button
                class="btn-submit w-full bg-orange active:bg-white transition ease-in-out font-overpass font-bold text-[0.9375rem] text-gray-950 tracking-[0.15rem] px-5 py-3.75 md:p-5 rounded-full cursor-pointer">SUBMIT</button>
        </div>
        <div
            class="hidden thank-you-container w-full md:max-w-100 h-fit flex flex-col items-center bg-linear-to-b x-from-[#212730] from-[#0e1625] x-to-[#191d23] to-[#0a1121] text-white font-overpass px-6.25 py-8.75 md:px-8.75 md:py-12.5 rounded-[20px] gap-y-7.5 md:gap-y-8.75">
            <img src="./assets/thank-you-illustration.svg" alt="Success Illustration" class="w-fit">
            <p id="rating-result"
                class="bg-gray-900 font-normal text-[0.9375rem] text-orange px-3.75 py-2.5 rounded-full">
            </p>
            <div class="text-content flex flex-col text-center gap-y-6.25">
                <h2 class="font-bold text-[1.75rem] md:text-[1.875rem]">Thank You!</h2>
                <p class="font-normal text-[0.9375rem] text-gray-500 leading-6.25">We appreciate you taking the time to
                    give a rating. If you ever need more support, don't hesitate to
                    get in touch!</p>
            </div>
        </div>
    </div>
    <script>
        const ratingButtons = document.querySelectorAll('.btn-rating');
        const submitButton = document.querySelector('.btn-submit');
        const componentContainer = document.querySelector('.component-container');
        const thankYouContainer = document.querySelector('.thank-you-container');
        const ratingResult = document.getElementById('rating-result');
        let selectedRating = null;

        ratingButtons.forEach(button => {
            button.addEventListener('click', () => {
                ratingButtons.forEach(btn => {
                    btn.classList.remove('btn-rating-active');
                });

                button.classList.add('btn-rating-active');
                selectedRating = button.getAttribute('data-value');
                console.log("Selected Rating:", selectedRating);
            });
        });

        submitButton.addEventListener('click', () => {
            ratingButtons.forEach(button => {
                button.classList.remove('btn-rating-active');
            });

            if (!selectedRating) {
                alert("Please select a rating before submitting!");
                return;
            };

            ratingResult.textContent = `You selected ${selectedRating} out of 5`;

            componentContainer.classList.add('hidden');
            thankYouContainer.classList.remove('hidden');
        });

    </script>
</body>

</html>
