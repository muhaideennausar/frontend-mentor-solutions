<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Rating Component | Muhaideen Nausar | Frontend Mentor</title>
    <link rel="stylesheet" href="output.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Overpass:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="container w-full min-h-screen bg-gray-950 px-7.5 flex items-center justify-center">
        <div
            class="component-container w-full h-fit bg-linear-to-b x-from-[#212730] from-[#0e1625] x-to-[#191d23] to-[#0a1121] text-white font-overpass p-7.5 rounded-[20px]">
            <img src="./assets/star.svg" alt="Star Vector" class="bg-gray-900 p-3.75 rounded-full">
            <div class="text-content">
                <h1 class="font-bold text-2xl">How did we do?</h1>
                <p class="font-normal text-sm text-gray-500 leading-6.25">Please let us know how we did with your
                    support request.
                    All feedback is
                    appreciated to help us
                    improve our offering!</p>
            </div>
            <div class="rating-buttons">
                <button class="btn-rating btn-rating-active">1</button>
                <button class="btn-rating btn-rating-active">2</button>
                <button class="btn-rating btn-rating-active">3</button>
                <button class="btn-rating btn-rating-active">4</button>
                <button class="btn-rating btn-rating-active">5</button>
            </div>
            <button class="btn-submit">SUBMIT</button>
        </div>
    </div>
</body>

</html>
