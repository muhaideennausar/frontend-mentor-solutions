<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Build an NFT preview card component with HTML and CSS. Challenge from Frontend Mentor to practice responsive design and interactive hover states.">
    <meta name="keywords"
        content="Frontend Mentor, NFT preview card, HTML, CSS, front-end challenge, responsive design, hover states, coding practice">
    <title>NFT Preview Card | Frontend Mentor | Muhaideen Nausar</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
</head>

<body>
    <div class="nft-card">
        <div class="nft-banner">
            <img src="./assets/image-equilibrium.jpg" alt="Equilibrium NFT Image" class="nft-image">
            <div class="overlay"><img src="./assets/icon-view.svg" alt="Eye Icon" class="eye-icon"></div>
        </div>
        <div class="nft-content">
            <h1 class="nft-name">Equilibrium #3429</h1>
            <p class="nft-description">Our Equilibrium collection promotes balance and calm.</p>
            <div class="nft-stats-section">
                <span class="nft-price"><img src="./assets/icon-ethereum.svg" alt="Ethereum icon"
                        class="currency-icon">0.041ETH</span>
                <span class="days-left"><img src="./assets/icon-clock.svg" alt="Clock Icon" class="clock-icon">3 days
                    left</span>
            </div>
            <hr>
            <div class="author-section">
                <img src="./assets/image-avatar.png" alt="Author Avatar" class="author-avatar">
                <p class="author-name">Creation of <span>Jules Wyvern</span></p>
            </div>
        </div>
    </div>
</body>

</html>
