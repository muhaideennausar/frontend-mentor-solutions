<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ping Coming Soon | Muhaideen Nausar | Frontend Mentor</title>
    <link rel="shortcut icon" href="../favicon.png" type="image/x-icon">
    <link rel="stylesheet" href="output.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Franklin:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <script src="https://kit.fontawesome.com/fafa440880.js" crossorigin="anonymous"></script>
</head>

<body>
    <div class="main-container w-full min-h-screen flex flex-col items-center px-7.5 pt-25 pb-12.5 gap-y-12.5">
        <img src="./assets/logo.svg" alt="PING." class="logo h-5">
        <div class="text-content text-center">
            <h1 class="font-light text-[1.75rem] text-gray-400">We are launching <span
                    class="font-bold text-blue-950">soon!</span>
            </h1>
            <p class="font-light text-base text-blue-950 mt-6.25">Subscribe and get notified</p>
        </div>
        <form class="w-full flex flex-col gap-y-2.5" novalidate>
            <div>
                <input type="email" placeholder="Your email address"
                    class="w-full h-12.5 text-[0.9375rem] text-blue-950 border-2 border-blue-200 px-7.5 rounded-full placeholder:text-blue-200 focus-within:border-blue-500 outline-none">
                <p class="w-full text-xs text-red-400 text-center italic mt-2.5 mb-5">Please provide
                    a
                    valid email address</p>
            </div>
            <button
                class="w-full h-12.5 bg-blue-500 font-semibold text-white rounded-full shadow-[0_7px_10px_rgba(79,125,243,0.20)]">Notify
                Me</button>
        </form>
        <img src="./assets/illustration-dashboard.png" alt="Dashboard Illustration" class="">
        <div class="footer w-fit mx-auto">
            <div class="social-links w-fit flex gap-x-5 mx-auto">
                <a href="https://www.facebook.com/"
                    class="w-7.5 h-7.5 flex items-center justify-center border border-blue-200 rounded-full"><i
                        class="fa-brands fa-facebook-f h-3.75 text-blue-500"></i></a>
                <a href="https://www.twitter.com/"
                    class="w-7.5 h-7.5 flex items-center justify-center border border-blue-200 rounded-full"><i
                        class="fa-brands fa-twitter w-3.75 text-blue-500"></i></a>
                <a href="https://www.instagram.com/"
                    class="w-7.5 h-7.5 flex items-center justify-center border border-blue-200 rounded-full"><i
                        class="fa-brands fa-instagram h-3.75 text-blue-500"></i></a>
            </div>
            <p class="text-xs text-gray-400 mt-7.5">© Copyright Ping. All rights reserved.</p>
        </div>
    </div>
</body>

</html>
