<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ping Coming Soon | Muhaideen Nausar | Frontend Mentor</title>
    <link rel="shortcut icon" href="../favicon.png" type="image/x-icon">
    <link rel="stylesheet" href="output.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Franklin:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <script src="https://kit.fontawesome.com/fafa440880.js" crossorigin="anonymous"></script>
</head>

<body>
    <div
        class="main-container w-full min-h-screen flex flex-col items-center px-7.5 pt-25 pb-12.5 gap-y-12.5 md:gap-y-17.5">
        <img src="./assets/logo.svg" alt="PING." class="logo h-5 md:h-6.25">
        <div class="text-content text-center">
            <h1 class="font-light text-[1.75rem] md:text-[3rem] text-gray-400">We are launching <span
                    class="font-bold text-blue-950">soon!</span>
            </h1>
            <p class="font-light text-base md:text-xl text-blue-950 mt-6.25 md:mt-7.5">Subscribe and get notified</p>
        </div>
        <form class="w-full md:w-fit flex flex-col md:flex-row gap-y-2.5 md:gap-x-2.5 md:mx-auto" novalidate>
            <div>
                <input id="email-input" type="email" placeholder="Your email address"
                    class="w-full md:min-w-100 h-12.5 md:h-13.75 text-[0.9375rem] text-blue-950 border-2 border-blue-200 px-7.5 rounded-full placeholder:text-blue-200 focus-within:border-blue-500 outline-none">
                <p id="error-message"
                    class="hidden w-full text-xs text-red-400 text-center md:text-left italic md:pl-7.5 mt-2.5 mb-5 md:mb-0">
                    Please
                    provide
                    a
                    valid email address</p>
            </div>
            <button id="submit-button"
                class="w-full md:w-fit h-12.5 md:h-13.75 bg-blue-500 font-semibold text-white md:px-12.5 rounded-full shadow-[0_7px_10px_rgba(79,125,243,0.20)] data-[invalid]:cursor-not-allowed data-[invalid]:hover:bg-[image:linear-gradient(#c2d3ff80,#c2d3ff80)] data-[invalid]:active:bg-[image:linear-gradient(#c2d3ff80,#c2d3ff80)] transition-colors"
                data-invalid>
                Notify Me
            </button>
        </form>
        <img src="./assets/illustration-dashboard.png" alt="Dashboard Illustration" class="md:max-w-150">
        <div class="footer w-fit mx-auto">
            <div class="social-links w-fit flex gap-x-5 mx-auto">
                <a href="https://www.facebook.com/"
                    class="w-7.5 h-7.5 md:w-10 md:h-10 flex items-center justify-center  text-blue-500 border border-blue-200 hover:border-0 hover:bg-blue-500 hover:text-white active:bg-blue-500 active:text-white rounded-full"><i
                        class="fa-brands fa-facebook-f h-3.75 md:h-5"></i></a>
                <a href="https://www.twitter.com/"
                    class="w-7.5 h-7.5 md:w-10 md:h-10 flex items-center justify-center  text-blue-500 border border-blue-200 hover:border-0 hover:bg-blue-500 hover:text-white active:bg-blue-500 active:text-white rounded-full"><i
                        class="fa-brands fa-twitter w-3.75 md:w-5"></i></a>
                <a href="https://www.instagram.com/"
                    class="w-7.5 h-7.5 md:w-10 md:h-10 flex items-center justify-center  text-blue-500 border border-blue-200 hover:border-0 hover:bg-blue-500 hover:text-white active:bg-blue-500 active:text-white rounded-full"><i
                        class="fa-brands fa-instagram h-3.75 md:h-5"></i></a>
            </div>
            <p class="text-xs text-gray-400 mt-7.5">© Copyright Ping. All rights reserved.</p>
        </div>
    </div>
    <script>
        const emailInput = document.getElementById('email-input');
        const errorMsg = document.getElementById('error-message');
        const submitButton = document.getElementById('submit-button'); // Named submitButton

        let typingTimer;
        let delay = 1000;

        emailInput.addEventListener('input', () => {
            clearTimeout(typingTimer);

            typingTimer = setTimeout(() => {
                validateEmail();
            }, delay);
        });

        function resetToDefault() {
            errorMsg.classList.add('hidden');
            emailInput.classList.add('focus-within:border-blue-500');
            emailInput.classList.remove('border-red-400', 'focus-within:border-red-400');
            submitButton.disabled = true;
        }

        function validateEmail() {
            const emailValue = emailInput.value.trim();

            if (emailValue === '') {
                resetToDefault();
                return;
            }

            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            const isValid = emailRegex.test(emailValue);

            updateUI(isValid);
        };

        function updateUI(isValid) {
            if (isValid) {
                errorMsg.classList.add('hidden');
                emailInput.classList.add('focus-within:border-blue-500');
                emailInput.classList.remove('border-red-400', 'focus-within:border-red-400');
                submitButton.disabled = false;
            } else {
                errorMsg.classList.remove('hidden');
                emailInput.classList.remove('focus-within:border-blue-500');
                emailInput.classList.add('border-red-400', 'focus-within:border-red-400');
                submitButton.disabled = true;
            }
        }
    </script>
</body>

</html>
