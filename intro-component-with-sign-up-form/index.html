<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intro Component | Muhaideen Nausar | Frontend Mentor Challenge</title>
    <link rel="shortcut icon" href="../favicon.png" type="image/x-icon">
    <link rel="stylesheet" href="output.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
</head>

<body>
    <div
        class="main-container w-full min-h-screen flex flex-col bg-red-400 bg-[url('./assets/bg-intro-mobile.png')] bg-no-repeat bg-cover gap-y-17.5 px-6.25 py-25">
        <section class="section-1 w-full text-center text-white">
            <h1 class="font-bold text-[1.75rem]">Learn to code by watching others</h1>
            <p class="font-medium mt-10">See how experienced developers solve problems in real-time. Watching
                scripted tutorials is great, but
                understanding how developers think is invaluable.</p>
        </section>
        <section class="section-2 flex flex-col gap-y-6.25">
            <span
                class="block text-center bg-purple-700 py-2.5 py-6.25 rounded-[10px] shadow-[0_7px_0_rgba(0,0,0,0.25)]">
                <p class="font-normal text-white"><b>Try it free 7 days</b> then $20/mo, thereafter</p>
            </span>
            <form class="flex flex-col gap-y-5 bg-white px-6.25 py-7.5 rounded-[10px]">
                <input class="input-default" type="text" placeholder="First Name">
                <input class="input-default" type="text" placeholder="Last Name">
                <input class="input-default" type="email" placeholder="Email Address">
                <input class="input-default" type="password" placeholder="Password">
                <button type="submit">Claim Your Free Trial</button>
                <p class="font-semibold text-[0.625rem] text-[rgba(0,0,0,0.25)] text-center">By clicking the button, you
                    are
                    agreeing to our <span class="text-red-400 opacity-100">Terms and Services</span></p>
            </form>
        </section>
    </div>
</body>

</html>
